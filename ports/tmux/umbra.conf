# Umbra — tmux color reference
# Paste into your tmux.conf or set via programs.tmux.extraConfig.

# ── Pane borders ──────────────────────────────────────────────────────────────
set -g pane-border-style              "fg=#2a2240"
set -g pane-active-border-style       "fg=#b48cff"

# ── Status bar ────────────────────────────────────────────────────────────────
set -g status-style                   "bg=#181327,fg=#9a8db8"
set -g status-left-style              "bg=#181327,fg=#b48cff"
set -g status-right-style             "bg=#181327,fg=#6e6189"

# ── Windows ───────────────────────────────────────────────────────────────────
set -g window-status-style            "fg=#6e6189,bg=#181327"
set -g window-status-current-style    "fg=#ece6f7,bg=#2c2244,bold"
set -g window-status-activity-style   "fg=#e8c87a,bg=#181327"
set -g window-status-bell-style       "fg=#e26a7a,bg=#181327,bold"
set -g window-status-separator        " "

# ── Messages ──────────────────────────────────────────────────────────────────
set -g message-style                  "bg=#2c2244,fg=#ece6f7"
set -g message-command-style          "bg=#2c2244,fg=#b48cff"

# ── Mode (copy-mode selection) ────────────────────────────────────────────────
set -g mode-style                     "bg=#392c56,fg=#ece6f7"

# ── Clock ─────────────────────────────────────────────────────────────────────
set -g clock-mode-colour              "#b48cff"
