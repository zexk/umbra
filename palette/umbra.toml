# Umbra — dark purple colorscheme
# Canonical palette. All ports and modules source from here.

[meta]
name        = "Umbra"
variant     = "dark"
version     = "0.2"
description = "A dark, plum-toned colour scheme built terminal-first"

# ── Backgrounds ──────────────────────────────────────────────────────────────
[backgrounds]
bg0 = "#0c040f"   # base / void
bg1 = "#160a19"   # window background
bg2 = "#231426"   # panel / sidebar
bg3 = "#301f34"   # card / hover
bg4 = "#412d45"   # selection / active
bg5 = "#553e5a"   # border bright

# ── Foregrounds ───────────────────────────────────────────────────────────────
[foregrounds]
fg0 = "#d9d1da"   # primary text
fg1 = "#b1a7b3"   # secondary text
fg2 = "#887b8c"   # muted
fg3 = "#645567"   # comment / disabled

# ── Borders ───────────────────────────────────────────────────────────────────
[borders]
line      = "#1d1120"
line_soft = "#130915"

# ── Accents ───────────────────────────────────────────────────────────────────
[accents]
iris      = "#b07bbc"   # primary plum — prompts, focus, selected items
iris_soft = "#886498"   # hover state of iris, links
mauve     = "#c68fc1"   # highlight — numbers, constants, pulls
magenta   = "#b56b8f"   # secondary — operators, keymaps, pizzazz

# ── ANSI 16 ───────────────────────────────────────────────────────────────────
[ansi]
black   = "#170d1a"
red     = "#b97873"
green   = "#8daf8e"
yellow  = "#c1a77b"
blue    = "#6ca0be"
magenta = "#b77e9e"
cyan    = "#7cb0af"
white   = "#b1a7b3"

[ansi.bright]
black   = "#3c2c40"
red     = "#d68f89"
green   = "#a8c8a8"
yellow  = "#d9c098"
blue    = "#84b9d8"
magenta = "#d395b8"
cyan    = "#96c9c8"
white   = "#dcd4de"

# ── Semantic ──────────────────────────────────────────────────────────────────
[semantic]
success = "#8daf8e"
warn    = "#c1a77b"
error   = "#b97873"
info    = "#6ca0be"

# ── Syntax tokens ─────────────────────────────────────────────────────────────
[syntax]
keyword  = "#b07bbc"   # iris       — control flow, if, struct, return
function = "#c68fc1"   # mauve      — definitions and call sites
type     = "#7cb0af"   # ansi.cyan  — classes, structs, generics
string   = "#8daf8e"   # ansi.green — literals and templates
number   = "#c1a77b"   # ansi.yellow — ints, floats, hex literals
operator = "#b56b8f"   # magenta    — + - = == :: punctuation
property = "#84b9d8"   # ansi.bright.blue — struct fields, css props
comment  = "#645567"   # fg3        — low-prominence prose
